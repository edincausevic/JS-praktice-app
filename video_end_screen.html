<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause & Practice</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Full Screen Container */
        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        /* Animated Pause Icon */
        .pause-icon-container {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(99, 102, 241, 0.4);
            border-radius: 50%;
            margin-bottom: 2rem;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
            animation: pulse 2s infinite;
        }

        .pause-icon {
            display: flex;
            gap: 12px;
        }

        .pause-bar {
            width: 12px;
            height: 38px;
            background: #6366f1;
            border-radius: 4px;
        }

        /* Typography */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.35rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        p strong {
            color: #38bdf8;
            font-weight: 600;
        }

        /* Action Card / Link display */
        .url-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 2.5rem;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 0.05em;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
        }

        .url-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .web-icon {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* Responsive tweak */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1.1rem; }
            .url-card { font-size: 1.1rem; padding: 1rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="pause-icon-container">
            <div class="pause-icon">
                <div class="pause-bar"></div>
                <div class="pause-bar"></div>
            </div>
        </div>

        <h1>Your Turn to Practice</h1>
        <p>Please <strong>pause this video</strong> now, head over to the app, and complete the exercises for this video.</p>
        
        <div class="url-card">
            <span class="web-icon">🌐</span>
            <span>edincausevic.github.io/JS-praktice-app/</span>
        </div>
    </div>

</body>
</html>
